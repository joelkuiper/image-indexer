# Image Indexer Configuration
# Shared single source of truth for local CLI and remote workers.

[default]
# Database configuration
db_path = "~/.local/share/image-indexer/index.db"

# Embedding space configurations (CLIP Model)
embed_model_id = "openai/clip-vit-base-patch32"
embed_dim = 512

# Caption / VLM Configurations (Qwen3-VL Model)
caption_model_id = "Qwen/Qwen3-VL-4B-Instruct"
caption_prompt = "You are an expert photo curator building a searchable archive. Describe this image in 2-4 sentences. Cover the main subjects, the setting, the mood and lighting, dominant colours, and transcribe any visible text. Write plain descriptive prose with no preamble."

# Concurrency control
max_workers = 5

# Remote inference server configuration
remote_api_base = "https://your-vm.example.com/api"
remote_timeout = 300

# Terminal display settings for humans
cli_desc_wrap_len = 160  # Expand display to fit rich captions nicely
cli_max_results = 10
